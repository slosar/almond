name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  reference:
    name: reference tests (CPU) · py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install almond without its GPU dependency (cupy-cuda12x); the
          # CPU reference suite needs only numpy + ducc0.
          pip install --no-deps -e .
          pip install numpy ducc0 pytest

      - name: Run CPU reference suite (NumPy reference vs ducc0)
        run: |
          # test_gpu.py and test_simaster.py importorskip("cupy") and are
          # skipped here; they run on CUDA hardware (see README).
          pytest tests/ -v -m "not slow"
